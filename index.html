<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ARTWELL P-XML</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f3f7fb;
display:flex;
flex-direction:column;
min-height:100vh;
}

.header{
background:white;
padding:16px 26px;
display:flex;
justify-content:space-between;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.toolbar{
padding:20px 26px;
display:flex;
justify-content:flex-end;
gap:10px;
}

.btn{
background:#3a8bfd;
border:none;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.container{
flex:1;
padding:0 26px 30px;
}

.project{
background:white;
border-radius:12px;
padding:16px;
margin-bottom:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.projectHeader{
display:flex;
justify-content:space-between;
cursor:pointer;
}

.tags span{
background:#eef4ff;
padding:6px 10px;
border-radius:6px;
margin-left:6px;
font-size:13px;
}

.docs{
margin-top:14px;
border-top:1px solid #e5edf7;
padding-top:12px;
}

.doc{
background:#f7fbff;
padding:12px;
border-radius:8px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.actions button{
margin-left:6px;
background:#d9e9ff;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.footer{
background:white;
text-align:center;
padding:16px;
margin-top:auto;
box-shadow:0 -2px 8px rgba(0,0,0,0.06);
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:flex;
justify-content:center;
align-items:center;
}

.modalBox{
background:white;
padding:24px;
border-radius:10px;
width:500px;
}

.hidden{
display:none;
}

textarea{
width:100%;
height:260px;
}

</style>
</head>

<body>

<div class="header">
<div><b>ARTWELL P-XML</b></div>
<div>Иванов И.И | ID 123</div>
</div>

<div class="toolbar">
<button class="btn" onclick="addProject()">+ Создать проект</button>
</div>

<div class="container" id="projects"></div>

<div class="footer">
ARTWELL P-XML | Hackathon 2026 | Команда Верифай
</div>

<!-- MODAL -->

<div id="modal" class="modal hidden">
<div class="modalBox">

<h3 id="modalTitle"></h3>

<input id="fileName" placeholder="Название документа"><br><br>
<input id="creator" placeholder="Сотрудник"><br><br>

<select id="status">
<option>Новый</option>
<option>На проверке</option>
<option>На согласовании</option>
<option>Готов</option>
</select>

<br><br>

<textarea id="xml"></textarea><br><br>

<button class="btn" onclick="saveFile()">Сохранить</button>
<button class="btn" onclick="closeModal()">Закрыть</button>

</div>
</div>

<script>

let currentProject=null
let editDoc=null

let projects=[
{ id:1,name:"ЖК Северный",open:true }
]

let docs=[
{
id:1,
projectId:1,
name:"Акт работ",
version:1,
creator:"Иванов",
status:"Готов",
xml:"<doc>example</doc>"
}
]

function render(){

let html=""

projects.forEach(p=>{

html+=`
<div class="project">

<div class="projectHeader">

<div onclick="toggle(${p.id})"><b>${p.name}</b></div>

<div class="tags">
<span>Заказчик</span>
<span>Ответственный</span>
<span style="background:#38b26c;color:white;">Активный</span>
<button class="btn" onclick="openAddFile(${p.id});event.stopPropagation()">+ Файл</button>
</div>

</div>

${p.open?renderDocs(p.id):""}

</div>
`

})

projects.innerHTML=html

}

function renderDocs(pid){

let html=`<div class="docs">`

docs.filter(d=>d.projectId===pid)
.forEach(d=>{

html+=`
<div class="doc">

<div>
${d.name} <b>v${d.version}</b>
</div>

<div class="actions">

<button onclick="viewDoc(${d.id})">Просмотр</button>
<button onclick="editDocument(${d.id})">Редактор</button>
<button onclick="newVersion(${d.id})">+ Версия</button>

<span>${d.creator}</span>
<span>${d.status}</span>

</div>

</div>
`

})

html+=`</div>`

return html

}

function toggle(id){
projects=projects.map(p=>{
if(p.id===id) p.open=!p.open
return p
})
render()
}

function addProject(){
let name=prompt("Название проекта")
if(!name) return

projects.push({
id:Date.now(),
name,
open:true
})

render()
}

function openAddFile(pid){
currentProject=pid
editDoc=null
modalTitle.innerText="Добавить документ"
fileName.value=""
creator.value=""
xml.value="<doc></doc>"
modal.classList.remove("hidden")
}

function editDocument(id){

let d=docs.find(x=>x.id===id)

editDoc=id
currentProject=d.projectId

modalTitle.innerText="Редактор XML"
fileName.value=d.name
creator.value=d.creator
xml.value=d.xml

modal.classList.remove("hidden")
}

function viewDoc(id){

let d=docs.find(x=>x.id===id)

alert(d.xml)

}

function saveFile(){

if(editDoc){

docs=docs.map(d=>{
if(d.id===editDoc){
d.name=fileName.value
d.creator=creator.value
d.xml=xml.value
}
return d
})

}else{

docs.push({
id:Date.now(),
projectId:currentProject,
name:fileName.value,
version:1,
creator:creator.value,
status:status.value,
xml:xml.value
})

}

closeModal()
render()

}

function newVersion(id){

docs=docs.map(d=>{
if(d.id===id) d.version++
return d
})

render()

}

function closeModal(){
modal.classList.add("hidden")
}

render()

</script>

</body>
</html>
