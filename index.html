<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Artwell Verify | Enterprise Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .code-editor { font-family: 'Fira Code', 'Courier New', monospace; background: #020617; color: #94a3b8; line-height: 1.6; }
        .animate-up { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 font-sans overflow-hidden">

    <div id="app" class="flex h-screen">
        <!-- SIDEBAR -->
        <aside class="w-80 bg-[#0f172a] border-r border-slate-800 p-8 flex flex-col shadow-2xl z-20 transition-all">
            <div class="flex items-center gap-4 mb-10">
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fas fa-folder-open text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-white font-black text-xl leading-none uppercase tracking-tighter">Artwell</h1>
                    <p class="text-[9px] font-black text-blue-500 uppercase tracking-[0.3em] mt-1">Verify System</p>
                </div>
            </div>
            
            <div class="space-y-8 flex-1 overflow-y-auto custom-scrollbar pr-2">
                <div>
                    <div class="flex justify-between items-center mb-4 px-2">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Проекты / Папки</p>
                        <!-- Кнопка создания папки для подрядчика -->
                        <button onclick="createNewFolder()" class="w-6 h-6 bg-slate-800 hover:bg-blue-600 text-white rounded-lg flex items-center justify-center transition shadow-lg">
                            <i class="fas fa-plus text-[10px]"></i>
                        </button>
                    </div>
                    <nav id="project-nav" class="space-y-1">
                        <!-- Папки рендерятся через JS -->
                    </nav>
                </div>
            </div>

            <div class="mt-auto p-5 bg-slate-900/50 rounded-[2rem] border border-slate-800 shadow-inner">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold text-white text-xs">АР</div>
                    <p class="text-xs font-bold text-white italic">Анна Rottsey</p>
                </div>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col bg-gradient-to-br from-[#020617] to-[#0f172a]">
            <header class="h-24 px-10 flex items-center justify-between border-b border-slate-800 bg-[#020617]/50 backdrop-blur-xl z-10 shadow-lg shadow-black/10">
                <div>
                    <p class="text-[9px] font-black text-slate-500 uppercase mb-1 tracking-[0.2em] italic">Текущая директория</p>
                    <h2 id="current-project-title" class="text-2xl font-black text-white uppercase tracking-tight italic">Все документы</h2>
                </div>
                
                <button onclick="document.getElementById('fileInput').click()" class="bg-white hover:bg-blue-50 text-slate-950 px-8 py-3.5 rounded-2xl font-black transition-all shadow-xl shadow-white/5 flex items-center gap-3 active:scale-95">
                    <i class="fas fa-file-upload"></i> ЗАГРУЗИТЬ ФАЙЛ
                </button>
            </header>

            <!-- Registry Content -->
            <div id="registry" class="flex-1 p-10 overflow-y-auto custom-scrollbar space-y-4">
                <!-- Файлы рендерятся тут -->
            </div>
        </main>
    </div>

    <!-- ADVANCED EDITOR MODAL -->
    <div id="editorModal" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/95 backdrop-blur-xl">
        <div class="bg-[#0f172a] w-full max-w-6xl h-[90vh] rounded-[3rem] border border-slate-700 shadow-2xl flex flex-col overflow-hidden animate-up">
            <!-- Modal Header -->
            <div class="p-8 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                <div class="flex items-center gap-5 flex-1 mr-10">
                    <div class="bg-blue-600/20 p-4 rounded-2xl border border-blue-500/20"><i class="fas fa-file-code text-blue-500 text-xl"></i></div>
                    <div class="flex-1">
                        <label class="text-[9px] font-black text-slate-500 uppercase block mb-1">Имя документа (редактируемое)</label>
                        <input id="modalFileName" type="text" class="bg-transparent text-2xl font-black text-white italic tracking-tight uppercase outline-none border-b border-transparent focus:border-blue-500 w-full transition-all">
                    </div>
                </div>
                <button onclick="closeModal()" class="w-12 h-12 rounded-full bg-slate-800 text-slate-400 hover:text-white transition flex items-center justify-center text-2xl">&times;</button>
            </div>
            
            <div class="flex-1 flex overflow-hidden">
                <!-- Text Editor -->
                <textarea id="fileContent" class="flex-1 code-editor p-10 outline-none resize-none custom-scrollbar text-sm" spellcheck="false"></textarea>
                
                <!-- Settings Panel -->
                <div class="w-80 p-8 space-y-8 bg-slate-900/30 border-l border-slate-800 shrink-0">
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-widest">Статус ЖЦ</label>
                        <select id="in-status" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold outline-none">
                            <option value="новый">⚪ Новый</option>
                            <option value="в разработке">🟡 В разработке</option>
                            <option value="готов">🟢 Готов</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-widest">Переместить в папку</label>
                        <select id="in-proj" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold outline-none">
                            <!-- Опции проектов -->
                        </select>
                    </div>

                    <div class="pt-20 space-y-4">
                        <button onclick="saveDocumentChanges()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white p-5 rounded-2xl font-black text-xs uppercase tracking-widest transition shadow-xl shadow-emerald-600/20">Принять изменения</button>
                        <button onclick="closeModal()" class="w-full bg-slate-800 hover:bg-slate-700 text-white p-5 rounded-2xl font-black text-xs uppercase transition tracking-widest italic">Отмена</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" class="hidden" onchange="processLocalFile(this)">

    <script>
        // ИМИТАЦИЯ БД
        let db = [
            { id: 1, name: 'MainSchema-2026.xsd', project: 'ЖК Артвелл', status: 'готов', ver: 1, content: '<?xml version="1.0" encoding="UTF-8"?>\n<xs:schema xmlns:xs="http://www.w3.org">...</xs:schema>' },
            { id: 2, name: 'Notice.txt', project: 'Заметки', status: 'в разработке', ver: 2, content: 'Проверить соответствие XSD схеме Минстроя до 27-го числа.' }
        ];

        let folders = ['ЖК Артвелл', 'Заметки'];
        let currentFolder = 'all';
        let activeId = null;

        function render() {
            // 1. Рендер папок в сайдбаре
            const nav = document.getElementById('project-nav');
            const folderButtons = `
                <button onclick="setFolder('all')" class="w-full text-left p-3.5 rounded-2xl hover:bg-slate-800 transition text-sm font-bold flex items-center justify-between ${currentFolder === 'all' ? 'bg-blue-600/10 text-blue-400' : ''}">
                    <span>📦 Все документы</span>
                </button>
            ` + folders.map(f => `
                <button onclick="setFolder('${f}')" class="w-full text-left p-3.5 rounded-2xl hover:bg-slate-800 transition text-sm font-bold flex items-center justify-between ${currentFolder === f ? 'bg-blue-600/10 text-blue-400' : 'text-slate-400 group'}">
                    <span class="truncate">📂 ${f}</span>
                    <i class="fas fa-trash text-[8px] opacity-0 group-hover:opacity-30 hover:!opacity-100 transition" onclick="event.stopPropagation(); deleteFolder('${f}')"></i>
                </button>
            `).join('');
            nav.innerHTML = folderButtons;

            // 2. Рендер списка документов
            const container = document.getElementById('registry');
            const filtered = currentFolder === 'all' ? db : db.filter(d => d.project === currentFolder);
            
            container.innerHTML = filtered.map(doc => `
                <div class="bg-[#0f172a] p-6 rounded-[2.5rem] border border-slate-800/50 flex items-center justify-between transition-all hover:border-blue-500/30 group animate-up shadow-lg">
                    <div class="flex items-center gap-6">
                        <div class="w-14 h-14 bg-slate-900 rounded-2xl flex items-center justify-center border border-slate-700 shadow-inner group-hover:scale-105 transition"><i class="fas fa-file-code text-slate-600 text-lg"></i></div>
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <h4 class="text-lg font-black text-white italic tracking-tighter uppercase">${doc.name}</h4>
                                <span class="bg-blue-600/10 text-blue-400 text-[9px] px-2 rounded font-black italic uppercase border border-blue-500/10 text-[8px]">v.${doc.ver}</span>
                            </div>
                            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest italic">${doc.project} • <span class="text-slate-400 font-black">${doc.status.toUpperCase()}</span></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="openEditor(${doc.id})" class="bg-slate-900 hover:bg-blue-600 text-slate-400 hover:text-white px-8 py-3.5 rounded-2xl text-[10px] font-black uppercase transition-all border border-slate-800 tracking-widest italic shadow-lg">Редактировать</button>
                        <button onclick="deleteDocument(${doc.id})" class="w-12 h-12 bg-slate-900 hover:bg-rose-600/10 text-slate-600 hover:text-rose-500 rounded-2xl transition border border-slate-800 flex items-center justify-center active:scale-90"><i class="fas fa-times"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function createNewFolder() {
            const name = prompt('Название новой папки:');
            if (name && !folders.includes(name)) {
                folders.push(name);
                render();
            }
        }

        function deleteFolder(name) {
            if (confirm(`Удалить папку "${name}" и переместить файлы в корень?`)) {
                folders = folders.filter(f => f !== name);
                db.forEach(d => { if(d.project === name) d.project = folders[0] || 'Все'; });
                if (currentFolder === name) currentFolder = 'all';
                render();
            }
        }

        function openEditor(id) {
            activeId = id;
            const doc = db.find(d => d.id === id);
            
            document.getElementById('modalFileName').value = doc.name;
            document.getElementById('fileContent').value = doc.content;
            document.getElementById('in-status').value = doc.status;
            
            // Заполняем список папок в модалке
            const projSelect = document.getElementById('in-proj');
            projSelect.innerHTML = folders.map(f => `<option value="${f}" ${doc.project === f ? 'selected' : ''}>${f}</option>`).join('');

            document.getElementById('editorModal').style.display = 'flex';
        }

        function saveDocumentChanges() {
            const doc = db.find(d => d.id === activeId);
            doc.name = document.getElementById('modalFileName').value;
            doc.content = document.getElementById('fileContent').value;
            doc.status = document.getElementById('in-status').value;
            doc.project = document.getElementById('in-proj').value;
            doc.ver += 1;
            
            closeModal();
            render();
        }

        function processLocalFile(input) {
            if (!input.files.length) return;
            const file = input.files;
            const reader = new FileReader();
            reader.onload = function(e) {
                db.unshift({
                    id: Date.now(),
                    name: file.name,
                    project: currentFolder === 'all' ? (folders[0] || 'Все') : currentFolder,
                    status: 'новый',
                    ver: 1,
                    content: e.target.result
                });
                render();
            };
            reader.readAsText(file);
        }

        function deleteDocument(id) {
            if (confirm('Удалить файл?')) {
                db = db.filter(d => d.id !== id);
                render();
            }
        }

        function setFolder(f) { currentFolder = f; document.getElementById('current-project-title').innerText = f === 'all' ? 'Все документы' : f; render(); }
        function closeModal() { document.getElementById('editorModal').style.display = 'none'; }

        // Запуск
        render();
    </script>
</body>
</html>
