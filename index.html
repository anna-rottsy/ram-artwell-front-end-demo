<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Artwell Verify | PLM System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    
    <!-- Подключаем редакторы (Таблицы и Код) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdnjs.cloudflare.com"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .handsontable { color: #cbd5e1 !important; }
        .htCore td, .htCore th { background: #0f172a !important; border-color: #334155 !important; color: #94a3b8 !important; }
        .animate-up { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 font-sans overflow-hidden">

    <div id="app" class="flex h-screen">
        <!-- ЛЕВАЯ ПАНЕЛЬ -->
        <aside class="w-80 bg-[#0f172a] border-r border-slate-800 p-8 flex flex-col shadow-2xl z-20">
            <div class="flex items-center gap-4 mb-10">
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fas fa-project-diagram text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-white font-black text-xl leading-none uppercase tracking-tighter italic">Artwell</h1>
                    <p id="role-label" class="text-[9px] font-black text-blue-500 uppercase tracking-[0.3em] mt-1 italic">Подрядчик</p>
                </div>
            </div>
            
            <div class="space-y-8 flex-1 overflow-y-auto custom-scrollbar">
                <div>
                    <div class="flex justify-between items-center mb-4 px-2">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Директории</p>
                        <button onclick="addFolder()" id="add-folder-btn" class="w-6 h-6 bg-slate-800 hover:bg-blue-600 text-white rounded-lg flex items-center justify-center transition">
                            <i class="fas fa-plus text-[10px]"></i>
                        </button>
                    </div>
                    <nav id="folder-list" class="space-y-1"></nav>
                </div>
            </div>

            <!-- ПЕРЕКЛЮЧАТЕЛЬ РОЛЕЙ -->
            <div class="mt-auto p-5 bg-slate-900/50 rounded-[2.5rem] border border-slate-800">
                <div class="flex gap-2 p-1 bg-slate-950 rounded-2xl border border-slate-800">
                    <button onclick="changeRole('contractor')" id="btn-role-cont" class="flex-1 py-2.5 text-[10px] font-black rounded-xl transition-all uppercase bg-blue-600 text-white">Подрядчик</button>
                    <button onclick="changeRole('client')" id="btn-role-clie" class="flex-1 py-2.5 text-[10px] font-black rounded-xl transition-all uppercase text-slate-500">Заказчик</button>
                </div>
            </div>
        </aside>

        <!-- ГЛАВНЫЙ КОНТЕНТ -->
        <main class="flex-1 flex flex-col bg-gradient-to-br from-[#020617] to-[#0f172a]">
            <header class="h-24 px-10 flex items-center justify-between border-b border-slate-800 bg-[#020617]/50 backdrop-blur-xl">
                <div>
                    <p class="text-[9px] font-black text-slate-500 uppercase mb-1 tracking-[0.2em] italic font-serif">Registry v2.0</p>
                    <h2 id="current-title" class="text-2xl font-black text-white uppercase tracking-tight italic">Все документы</h2>
                </div>
                <div id="contractor-actions">
                    <button onclick="addNewFile()" class="bg-white hover:bg-blue-50 text-slate-950 px-8 py-3.5 rounded-2xl font-black transition-all shadow-xl flex items-center gap-3">
                        <i class="fas fa-plus"></i> НОВЫЙ ФАЙЛ
                    </button>
                </div>
            </header>

            <div id="file-registry" class="flex-1 p-10 overflow-y-auto custom-scrollbar space-y-4"></div>
        </main>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО РЕДАКТОРА -->
    <div id="modal" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/95 backdrop-blur-2xl">
        <div class="bg-[#0f172a] w-full max-w-7xl h-[90vh] rounded-[3.5rem] border border-slate-700 shadow-2xl flex flex-col overflow-hidden animate-up">
            <div class="p-8 border-b border-slate-800 flex justify-between items-center">
                <input id="modal-name" type="text" class="bg-transparent text-2xl font-black text-white italic uppercase outline-none focus:border-b border-blue-500 flex-1 mr-10">
                <button onclick="closeModal()" class="text-4xl text-slate-500 hover:text-white">&times;</button>
            </div>
            <div class="flex-1 flex">
                <div id="editor-zone" class="flex-1 bg-black"></div>
                <div class="w-80 p-8 border-l border-slate-800 space-y-6">
                    <label class="text-[10px] font-black text-slate-500 uppercase block tracking-widest">Статус</label>
                    <select id="modal-status" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white font-bold outline-none">
                        <option value="новый">⚪ Новый</option>
                        <option value="в разработке">🟡 В разработке</option>
                        <option value="готов">🟢 Готов</option>
                    </select>
                    <div class="pt-10 space-y-3">
                        <button id="save-btn" onclick="saveFile()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white p-5 rounded-2xl font-black text-[10px] uppercase">Сохранить</button>
                        <button onclick="closeModal()" class="w-full bg-slate-800 text-white p-5 rounded-2xl font-black text-[10px] uppercase">Закрыть</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ДАННЫЕ
        let state = {
            role: 'contractor',
            currentDir: null,
            folders: [{id: 1, name: 'Спецификации'}, {id: 2, name: 'Код проекта'}],
            files: [
                {id: 1, dir: 1, name: 'Расчеты.xlsx', type: 'sheet', content: [["Параметр", "Значение"], ["Бюджет", "1.5M"], ["Срок", "6 мес"]], status: 'готов'},
                {id: 2, dir: 2, name: 'Main.js', type: 'code', content: 'console.log("System Start");', status: 'в разработке'}
            ]
        };

        let currentFileId = null;
        let hot = null; // Инстанс таблиц
        let monacoEditor = null; // Инстанс кода

        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com' }});

        function render() {
            // Рендер папок
            const fl = document.getElementById('folder-list');
            fl.innerHTML = state.folders.map(f => `
                <div onclick="selectDir(${f.id})" class="p-4 rounded-2xl cursor-pointer transition ${state.currentDir === f.id ? 'bg-blue-600/10 border border-blue-500/20' : 'hover:bg-slate-800/50'}">
                    <span class="text-[11px] font-black uppercase ${state.currentDir === f.id ? 'text-blue-500' : 'text-slate-400'}">${f.name}</span>
                </div>
            `).join('');

            // Рендер файлов
            const fr = document.getElementById('file-registry');
            const list = state.currentDir ? state.files.filter(f => f.dir === state.currentDir) : state.files;
            fr.innerHTML = list.map(f => `
                <div class="bg-slate-900/40 border border-slate-800 p-6 rounded-[2rem] flex items-center justify-between">
                    <div class="flex items-center gap-6">
                        <i class="fas ${f.type === 'sheet' ? 'fa-table' : 'fa-file-code'} text-blue-500 text-2xl"></i>
                        <div><h4 class="text-white font-black uppercase italic">${f.name}</h4><span class="text-[9px] uppercase text-slate-500">${f.status}</span></div>
                    </div>
                    <button onclick="editFile(${f.id})" class="px-8 py-3 bg-slate-800 hover:bg-white hover:text-black rounded-xl text-[10px] font-black uppercase transition-all">Открыть</button>
                </div>
            `).join('');

            // Роли
            const isClient = state.role === 'client';
            document.getElementById('contractor-actions').style.display = isClient ? 'none' : 'block';
            document.getElementById('add-folder-btn').style.display = isClient ? 'none' : 'flex';
            document.getElementById('role-label').innerText = isClient ? 'Заказчик' : 'Подрядчик';
            document.getElementById('role-label').style.color = isClient ? '#10b981' : '#3b82f6';
        }

        function changeRole(role) {
            state.role = role;
            document.getElementById('btn-role-cont').className = role === 'contractor' ? "flex-1 py-2.5 text-[10px] font-black rounded-xl transition-all uppercase bg-blue-600 text-white" : "flex-1 py-2.5 text-[10px] font-black rounded-xl transition-all uppercase text-slate-500";
            document.getElementById('btn-role-clie').className = role === 'client' ? "flex-1 py-2.5 text-[10px] font-black rounded-xl transition-all uppercase bg-emerald-600 text-white" : "flex-1 py-2.5 text-[10px] font-black rounded-xl transition-all uppercase text-slate-500";
            render();
        }

        function editFile(id) {
            const file = state.files.find(f => f.id === id);
            currentFileId = id;
            const zone = document.getElementById('editor-zone');
            zone.innerHTML = '';
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modal-name').value = file.name;
            document.getElementById('modal-status').value = file.status;

            const isRead = state.role === 'client';
            document.getElementById('save-btn').style.display = isRead ? 'none' : 'block';
            document.getElementById('modal-name').readOnly = isRead;

            if(file.type === 'sheet') {
                hot = new Handsontable(zone, {
                    data: JSON.parse(JSON.stringify(file.content)),
                    rowHeaders: true, colHeaders: true, height: '100%', width: '100%',
                    licenseKey: 'non-commercial-and-evaluation',
                    readOnly: isRead, stretchH: 'all'
                });
            } else {
                require(['vs/editor/editor.main'], function() {
                    monacoEditor = monaco.editor.create(zone, {
                        value: file.content,
                        language: file.name.endsWith('.js') ? 'javascript' : 'plaintext',
                        theme: 'vs-dark',
                        readOnly: isRead,
                        automaticLayout: true
                    });
                });
            }
        }

        function saveFile() {
            const file = state.files.find(f => f.id === currentFileId);
            file.name = document.getElementById('modal-name').value;
            file.status = document.getElementById('modal-status').value;
            if(hot) file.content = hot.getData();
            if(monacoEditor) file.content = monacoEditor.getValue();
            closeModal();
            render();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            if(hot) { hot.destroy(); hot = null; }
            if(monacoEditor) { monacoEditor.dispose(); monacoEditor = null; }
        }

        function addNewFile() {
            const name = prompt("Назовите файл (.xlsx для таблиц):");
            if(!name) return;
            state.files.push({
                id: Date.now(), dir: state.currentDir || 1, name,
                type: name.endsWith('.xlsx') ? 'sheet' : 'code',
                content: name.endsWith('.xlsx') ? [["",""],["",""]] : "",
                status: 'новый'
            });
            render();
        }

        function addFolder() {
            const name = prompt("Название папки:");
            if(name) { state.folders.push({id: Date.now(), name}); render(); }
        }

        function selectDir(id) {
            state.currentDir = (state.currentDir === id) ? null : id;
            document.getElementById('current-title').innerText = state.currentDir ? state.folders.find(f => f.id === id).name : "Все документы";
            render();
        }

        render();
    </script>
</body>
</html>
