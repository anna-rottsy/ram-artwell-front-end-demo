<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Artwell Verify | Ultimate PLM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    
    <!-- Библиотеки для редакторов -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdnjs.cloudflare.com"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .animate-up { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        /* Стили для Handsontable в темной теме */
        .handsontable { color: #cbd5e1; }
        .htCore td, .htCore th { background: #0f172a; border-color: #334155; color: #94a3b8; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 font-sans overflow-hidden">

    <div id="app" class="flex h-screen">
        <!-- SIDEBAR -->
        <aside class="w-80 bg-[#0f172a] border-r border-slate-800 p-8 flex flex-col shadow-2xl z-20">
            <div class="flex items-center gap-4 mb-10">
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fas fa-project-diagram text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-white font-black text-xl leading-none uppercase tracking-tighter">Artwell</h1>
                    <p id="role-label" class="text-[9px] font-black text-blue-500 uppercase tracking-[0.3em] mt-1 italic">Подрядчик</p>
                </div>
            </div>
            
            <div class="space-y-8 flex-1 overflow-y-auto custom-scrollbar pr-2">
                <div>
                    <div class="flex justify-between items-center mb-4 px-2">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Проекты / Папки</p>
                        <button id="add-folder-btn" onclick="createNewFolder()" class="w-6 h-6 bg-slate-800 hover:bg-blue-600 text-white rounded-lg flex items-center justify-center transition shadow-lg">
                            <i class="fas fa-plus text-[10px]"></i>
                        </button>
                    </div>
                    <nav id="project-nav" class="space-y-1"></nav>
                </div>
            </div>

            <!-- ПЕРЕКЛЮЧАТЕЛЬ РОЛЕЙ -->
            <div class="mt-auto p-5 bg-slate-900/50 rounded-[2.5rem] border border-slate-800">
                <p class="text-[9px] font-black text-slate-500 uppercase mb-3 text-center tracking-widest italic">Выберите кабинет</p>
                <div class="flex gap-2 p-1 bg-slate-950 rounded-2xl border border-slate-800">
                    <button onclick="setRole('contractor')" id="btn-role-cont" class="flex-1 py-2.5 text-[10px] font-black rounded-xl transition-all uppercase bg-blue-600 text-white">Подрядчик</button>
                    <button onclick="setRole('client')" id="btn-role-clie" class="flex-1 py-2.5 text-[10px] font-black rounded-xl transition-all uppercase text-slate-500">Заказчик</button>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col bg-gradient-to-br from-[#020617] to-[#0f172a]">
            <header class="h-24 px-10 flex items-center justify-between border-b border-slate-800 bg-[#020617]/50 backdrop-blur-xl z-10">
                <div>
                    <p class="text-[9px] font-black text-slate-500 uppercase mb-1 tracking-[0.2em] italic">Система верификации</p>
                    <h2 id="current-project-title" class="text-2xl font-black text-white uppercase tracking-tight italic">Все документы</h2>
                </div>
                <div id="contractor-header-actions">
                    <button onclick="createNewFile()" class="bg-white hover:bg-blue-50 text-slate-950 px-8 py-3.5 rounded-2xl font-black transition-all shadow-xl flex items-center gap-3 active:scale-95">
                        <i class="fas fa-plus"></i> СОЗДАТЬ ФАЙЛ
                    </button>
                </div>
            </header>

            <div id="registry" class="flex-1 p-10 overflow-y-auto custom-scrollbar space-y-4"></div>
        </main>
    </div>

    <!-- MODAL EDITOR -->
    <div id="editorModal" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/95 backdrop-blur-2xl">
        <div class="bg-[#0f172a] w-full max-w-7xl h-[90vh] rounded-[3.5rem] border border-slate-700 shadow-2xl flex flex-col overflow-hidden animate-up">
            <div class="p-8 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                <div class="flex items-center gap-6 flex-1 mr-10">
                    <div class="bg-blue-600/20 p-4 rounded-2xl border border-blue-500/20"><i id="modal-icon" class="fas fa-file-alt text-blue-500 text-xl"></i></div>
                    <div class="flex-1">
                        <input id="modalFileName" type="text" class="bg-transparent text-2xl font-black text-white italic uppercase outline-none border-b border-transparent focus:border-blue-500 w-full transition-all">
                    </div>
                </div>
                <button onclick="closeModal()" class="w-12 h-12 rounded-full bg-slate-800 text-slate-500 hover:text-white transition flex items-center justify-center text-2xl">&times;</button>
            </div>
            
            <div class="flex-1 flex overflow-hidden">
                <!-- Контейнер для динамического редактора -->
                <div id="editor-viewport" class="flex-1 bg-[#020617] overflow-hidden"></div>
                
                <!-- Боковая панель управления -->
                <div class="w-80 p-8 space-y-8 bg-slate-900/30 border-l border-slate-800 shrink-0">
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-widest italic">Статус документа</label>
                        <select id="in-status" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold outline-none">
                            <option value="новый">⚪ Новый</option>
                            <option value="в разработке">🟡 В разработке</option>
                            <option value="готов">🟢 Готов</option>
                        </select>
                    </div>
                    <div class="pt-10 space-y-3">
                        <button id="modal-save-btn" onclick="saveAllChanges()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white p-5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition shadow-lg shadow-emerald-900/20">Сохранить</button>
                        <button onclick="closeModal()" class="w-full bg-slate-800 hover:bg-slate-700 text-white p-5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition italic">Отмена</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let state = {
            role: 'contractor',
            folders: [
                { id: 1, name: 'Спецификации', icon: 'fa-file-invoice' },
                { id: 2, name: 'Программный код', icon: 'fa-code' }
            ],
            files: [
                { id: 1, folderId: 1, name: 'Бюджет.xlsx', type: 'sheet', content: [["Статья", "Сумма"], ["Дизайн", "5000"], ["Разработка", "12000"]], status: 'готов' },
                { id: 2, folderId: 2, name: 'Server.js', type: 'code', content: 'console.log("Hello PLM");', status: 'в разработке' },
                { id: 3, folderId: 1, name: 'Описание_проекта.txt', type: 'code', content: 'Текст документа...', status: 'новый' }
            ],
            currentFolderId: null,
            editingFileId: null
        };

        let monacoEditor = null;
        let hotInstance = null;

        // Инициализация Monaco
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com' }});

        function init() {
            renderFolders();
            renderFiles();
            updateUIByRole();
        }

        function setRole(role) {
            state.role = role;
            const btnCont = document.getElementById('btn-role-cont');
            const btnClie = document.getElementById('btn-role-clie');
            const label = document.getElementById('role-label');

            if(role === 'contractor') {
                btnCont.className = "flex-1 py-2.5 text-[10px] font-black rounded-xl transition-all uppercase bg-blue-600 text-white";
                btnClie.className = "flex-1 py-2.5 text-[10px] font-black rounded-xl transition-all uppercase text-slate-500";
                label.innerText = "Подрядчик";
            } else {
                btnClie.className = "flex-1 py-2.5 text-[10px] font-black rounded-xl transition-all uppercase bg-blue-600 text-white";
                btnCont.className = "flex-1 py-2.5 text-[10px] font-black rounded-xl transition-all uppercase text-slate-500";
                label.innerText = "Заказчик";
            }
            updateUIByRole();
        }

        function updateUIByRole() {
            const isClient = state.role === 'client';
            document.getElementById('contractor-header-actions').style.display = isClient ? 'none' : 'block';
            document.getElementById('add-folder-btn').style.display = isClient ? 'none' : 'flex';
            document.getElementById('modal-save-btn').style.display = isClient ? 'none' : 'block';
        }

        function renderFolders() {
            const nav = document.getElementById('project-nav');
            nav.innerHTML = state.folders.map(f => `
                <div onclick="filterFolder(${f.id})" class="flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition ${state.currentFolderId === f.id ? 'bg-blue-600/10 border border-blue-500/20' : 'hover:bg-slate-800/50'}">
                    <i class="fas ${f.icon} ${state.currentFolderId === f.id ? 'text-blue-500' : 'text-slate-500'}"></i>
                    <span class="text-[11px] font-black uppercase text-slate-400">${f.name}</span>
                </div>
            `).join('');
        }

        function renderFiles() {
            const container = document.getElementById('registry');
            const filtered = state.currentFolderId ? state.files.filter(f => f.folderId === state.currentFolderId) : state.files;
            
            container.innerHTML = filtered.map(f => `
                <div class="bg-slate-900/40 border border-slate-800 p-6 rounded-[2rem] flex items-center justify-between hover:border-blue-500/30 transition-all">
                    <div class="flex items-center gap-6">
                        <div class="w-12 h-12 bg-slate-800 rounded-xl flex items-center justify-center text-blue-500">
                            <i class="fas ${f.type === 'sheet' ? 'fa-table' : 'fa-file-code'}"></i>
                        </div>
                        <div>
                            <h4 class="text-white font-black uppercase tracking-tight italic">${f.name}</h4>
                            <span class="text-[9px] font-black uppercase text-slate-500 tracking-widest">${f.status}</span>
                        </div>
                    </div>
                    <button onclick="openEditor(${f.id})" class="px-8 py-3 bg-slate-800 hover:bg-white hover:text-black rounded-xl text-[10px] font-black uppercase transition-all">
                        ${state.role === 'contractor' ? 'Редактировать' : 'Просмотр'}
                    </button>
                </div>
            `).join('');
        }

        function openEditor(fileId) {
            const file = state.files.find(f => f.id === fileId);
            state.editingFileId = fileId;
            const isReadonly = state.role === 'client';
            const viewport = document.getElementById('editor-viewport');
            viewport.innerHTML = '';
            
            document.getElementById('modalFileName').value = file.name;
            document.getElementById('in-status').value = file.status;
            document.getElementById('editorModal').style.display = 'flex';

            if (file.type === 'sheet') {
                hotInstance = new Handsontable(viewport, {
                    data: JSON.parse(JSON.stringify(file.content)), // Клонируем данные
                    rowHeaders: true, colHeaders: true, height: '100%', width: '100%',
                    licenseKey: 'non-commercial-and-evaluation',
                    readOnly: isReadonly,
                    contextMenu: !isReadonly,
                    stretchH: 'all'
                });
            } else {
                require(['vs/editor/editor.main'], function() {
                    monacoEditor = monaco.editor.create(viewport, {
                        value: file.content,
                        language: file.name.includes('.') ? getLang(file.name.split('.').pop()) : 'plaintext',
                        theme: 'vs-dark',
                        readOnly: isReadonly,
                        automaticLayout: true,
                        fontSize: 14,
                        fontFamily: 'Fira Code, monospace'
                    });
                });
            }
        }

        function saveAllChanges() {
            const file = state.files.find(f => f.id === state.editingFileId);
            if (hotInstance) {
                file.content = hotInstance.getData();
                hotInstance.destroy();
                hotInstance = null;
            } else if (monacoEditor) {
                file.content = monacoEditor.getValue();
                monacoEditor.dispose();
                monacoEditor = null;
            }
            file.name = document.getElementById('modalFileName').value;
            file.status = document.getElementById('in-status').value;
            closeModal();
            renderFiles();
        }

        function closeModal() {
            document.getElementById('editorModal').style.display = 'none';
            if (hotInstance) { hotInstance.destroy(); hotInstance = null; }
            if (monacoEditor) { monacoEditor.dispose(); monacoEditor = null; }
        }

        function createNewFile() {
            const name = prompt("Название файла (например, data.xlsx или script.js):");
            if (!name) return;
            const type = name.endsWith('.xlsx') ? 'sheet' : 'code';
            state.files.push({
                id: Date.now(),
                folderId: state.currentFolderId || 1,
                name: name,
                type: type,
                content: type === 'sheet' ? [["", ""], ["", ""]] : "",
                status: 'новый'
            });
            renderFiles();
        }

        function createNewFolder() {
            const name = prompt("Название папки:");
            if (name) {
                state.folders.push({ id: Date.now(), name, icon: 'fa-folder' });
                renderFolders();
            }
        }

        function filterFolder(id) {
            state.currentFolderId = (state.currentFolderId === id) ? null : id;
            document.getElementById('current-project-title').innerText = state.currentFolderId 
                ? state.folders.find(f => f.id === id).name : "Все документы";
            renderFolders();
            renderFiles();
        }

        function getLang(ext) {
            const m = { js: 'javascript', py: 'python', html: 'html', css: 'css', sql: 'sql' };
            return m[ext] || 'plaintext';
        }

        window.onload = init;
    </script>
</body>
</html>
