<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Artwell Enterprise | Document Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); }
        .input-field { bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:border-blue-500 outline-none transition-all; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-up { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 font-sans antialiased overflow-hidden">

    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-80 bg-[#0f172a] border-r border-slate-800 p-8 flex flex-col shadow-2xl">
            <div class="flex items-center gap-4 mb-12">
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fas fa-file-signature text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-white font-black text-xl leading-none uppercase tracking-tighter">Artwell</h1>
                    <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mt-1">Verify System v2.0</p>
                </div>
            </div>
            
            <nav class="space-y-3 flex-1">
                <button onclick="renderRegistry()" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-blue-600/10 text-blue-400 font-bold border border-blue-500/20">
                    <i class="fas fa-th-list"></i> Реестр документов
                </button>
                <button class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-800 text-slate-500 font-medium transition">
                    <i class="fas fa-history"></i> Журнал аудита
                </button>
            </nav>

            <div class="p-6 bg-slate-900/50 rounded-3xl border border-slate-800">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-3">Уровень доступа</p>
                <div class="flex items-center gap-3 text-emerald-400 font-bold text-sm">
                    <i class="fas fa-user-shield"></i> Администратор ПО
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col">
            <!-- Header -->
            <header class="h-24 px-10 flex items-center justify-between border-b border-slate-800 bg-[#020617]/50 backdrop-blur-md">
                <div>
                    <h2 class="text-2xl font-black text-white">Мониторинг объектов</h2>
                    <p class="text-xs text-slate-500 font-medium">ЖК «Артвелл Парк», Секция 4.2</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="bg-slate-900 px-6 py-3 rounded-2xl border border-slate-800 text-center">
                        <p class="text-[9px] font-black text-slate-500 uppercase">Ошибок XSD</p>
                        <p id="error-count" class="text-rose-500 font-black">1</p>
                    </div>
                    <button onclick="document.getElementById('fileInput').click()" class="bg-white hover:bg-blue-50 text-slate-950 px-8 py-3.5 rounded-2xl font-black transition-all shadow-xl shadow-white/5 flex items-center gap-3">
                        <i class="fas fa-plus"></i> ЗАГРУЗИТЬ XML
                    </button>
                </div>
            </header>

            <!-- Registry Content -->
            <div id="registry-container" class="flex-1 p-10 overflow-y-auto space-y-4">
                <!-- Картчоки будут тут -->
            </div>
        </main>
    </div>

    <!-- MODAL EDITOR -->
    <div id="editorModal" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/90 backdrop-blur-xl">
        <div class="bg-[#1e293b] w-full max-w-2xl rounded-[2.5rem] border border-slate-700 shadow-2xl overflow-hidden animate-up">
            <div class="p-10 border-b border-slate-800 flex justify-between items-start bg-slate-900/40">
                <div>
                    <span id="modalBadge" class="px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-4 inline-block"></span>
                    <h3 class="text-3xl font-black text-white leading-none">Редактор документа</h3>
                </div>
                <button onclick="closeModal()" class="w-12 h-12 rounded-full bg-slate-800 text-slate-500 hover:text-white transition flex items-center justify-center">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <div class="p-10 space-y-8">
                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Номер документа</label>
                        <input id="in-num" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-white font-bold focus:border-blue-500 transition-all outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Дата выдачи</label>
                        <input id="in-date" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-white font-bold focus:border-blue-500 outline-none">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Объект строительства</label>
                    <input id="in-obj" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-white font-bold focus:border-blue-500 outline-none">
                </div>

                <div id="xsd-error" class="hidden p-6 bg-rose-500/10 border border-rose-500/20 rounded-3xl flex gap-4">
                    <i class="fas fa-bug text-rose-500 text-xl mt-1"></i>
                    <div>
                        <p class="text-xs font-black text-rose-500 uppercase mb-1">Ошибка XSD валидации</p>
                        <p class="text-sm text-rose-200/70 font-medium">Несоответствие схемы: Поле 'Contractor' содержит недопустимые символы или не заполнено.</p>
                    </div>
                </div>

                <div class="flex gap-4 pt-4">
                    <button onclick="commitNewVersion()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white p-5 rounded-2xl font-black text-sm uppercase tracking-widest transition shadow-lg shadow-blue-600/20">
                        Сохранить новую версию
                    </button>
                    <button onclick="closeModal()" class="px-10 bg-slate-800 hover:bg-slate-700 text-white rounded-2xl font-black text-sm uppercase transition">
                        Отмена
                    </button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" class="hidden" accept=".xml" onchange="handleFile(this)">

    <script>
        // Имитация БД
        let db = [
            { id: 1, num: 'АКТ-001/МИН', date: '20.03.2026', obj: 'ЖК Артвелл, корп 1', status: 'valid', ver: 1 },
            { id: 2, num: 'ERROR-DOC-99', date: '21.03.2026', obj: 'ЖК Артвелл, корп 2', status: 'error', ver: 1 }
        ];

        let activeId = null;

        function renderRegistry() {
            const container = document.getElementById('registry-container');
            container.innerHTML = db.map(doc => `
                <div class="bg-[#0f172a] p-6 rounded-[2rem] border border-slate-800 flex items-center justify-between hover:bg-slate-900/50 transition-all animate-up">
                    <div class="flex items-center gap-6">
                        <div class="w-14 h-14 bg-slate-800 rounded-2xl flex items-center justify-center border border-slate-700">
                            <i class="fas fa-file-alt text-slate-500"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <h4 class="text-xl font-black text-white">${doc.num}</h4>
                                <span class="px-2 py-0.5 bg-slate-800 rounded text-[10px] font-black text-slate-500 italic uppercase">v${doc.ver}</span>
                            </div>
                            <p class="text-xs font-bold text-slate-500 uppercase tracking-wider">${doc.obj} • ${doc.date}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-8">
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-600 uppercase mb-1">Статус</p>
                            <span class="text-xs font-black uppercase tracking-widest ${doc.status === 'valid' ? 'text-emerald-500' : 'text-rose-500'}">
                                ${doc.status === 'valid' ? '✓ Проверен' : '⚠ Ошибка XSD'}
                            </span>
                        </div>
                        <button onclick="openEditor(${doc.id})" class="bg-blue-600/10 hover:bg-blue-600 text-blue-400 hover:text-white px-8 py-3 rounded-xl text-xs font-black uppercase transition-all border border-blue-500/20">
                            Редактировать
                        </button>
                    </div>
                </div>
            `).join('');

            document.getElementById('error-count').innerText = db.filter(d => d.status === 'error').length;
        }

        function handleFile(input) {
            if (!input.files.length) return;
            const file = input.files[0];
            const isErr = file.name.toLowerCase().includes('error');
            
            const newDoc = {
                id: Date.now(),
                num: file.name.replace('.xml', '').toUpperCase(),
                date: new Date().toLocaleDateString(),
                obj: 'ЖК Артвелл Парк (Новый объект)',
                status: isErr ? 'error' : 'valid',
                ver: 1
            };
            db.unshift(newDoc);
            renderRegistry();
            alert('Файл загружен. Результат валидации: ' + (isErr ? 'ОШИБКА' : 'УСПЕХ'));
        }

        function openEditor(id) {
            activeId = id;
            const doc = db.find(d => d.id === id);
            
            document.getElementById('in-num').value = doc.num;
            document.getElementById('in-date').value = doc.date;
            document.getElementById('in-obj').value = doc.obj;
            
            const badge = document.getElementById('modalBadge');
            const errBlock = document.getElementById('xsd-error');
            
            if (doc.status === 'valid') {
                badge.innerText = 'Документ валиден';
                badge.className = 'px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-4 inline-block bg-emerald-500/10 text-emerald-500 border border-emerald-500/20';
                errBlock.classList.add('hidden');
            } else {
                badge.innerText = 'Требуется исправление';
                badge.className = 'px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-4 inline-block bg-rose-500/10 text-rose-500 border border-rose-500/20';
                errBlock.classList.remove('hidden');
            }

            document.getElementById('editorModal').style.display = 'flex';
        }

        function commitNewVersion() {
            const doc = db.find(d => d.id === activeId);
            const newNum = document.getElementById('in-num').value;
            
            doc.num = newNum;
            doc.date = document.getElementById('in-date').value;
            doc.obj = document.getElementById('in-obj').value;
            doc.ver += 1; // Новая версия

            // Если при редактировании мы убрали слово ERROR из номера, считаем документ исправленным
            if (!newNum.toLowerCase().includes('error')) {
                doc.status = 'valid';
            }

            closeModal();
            renderRegistry();
        }

        function closeModal() {
            document.getElementById('editorModal').style.display = 'none';
        }

        // Запуск
        renderRegistry();
    </script>
</body>
</html>
