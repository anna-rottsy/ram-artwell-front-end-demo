<script>
let state = {
    role: 'contractor',
    folder: 'all',
    folders: ['ЖК Артвелл', 'Изыскания'],
    docs: [
        { id: 1, name: 'MainSchema-01.xsd', project: 'ЖК Артвелл', status: 'готов', ver: 1, content: 'schema...' },
        { id: 2, name: 'GeoReport.xsd', project: 'Изыскания', status: 'в разработке', ver: 1, content: 'geo...' }
    ],
    activeId: null
};

function render() {

    const nav = document.getElementById('project-nav');

    nav.innerHTML =
        `<button onclick="setFolder('all')" class="w-full text-left p-4 rounded-2xl ${state.folder==='all'?'bg-blue-600/10 text-blue-400':'text-slate-500'}">
            Все документы
        </button>`
        +
        state.folders.map(f=>`
            <button onclick="setFolder('${f}')" class="w-full text-left p-4 rounded-2xl ${state.folder===f?'bg-blue-600/10 text-blue-400':'text-slate-500'}">
                ${f}
            </button>
        `).join('');

    const container = document.getElementById('registry');

    const filtered =
        state.folder==='all'
        ? state.docs
        : state.docs.filter(d=>d.project===state.folder);

    container.innerHTML = filtered.map(doc=>`
        <div class="bg-[#0f172a] p-8 rounded-3xl flex justify-between items-center">
            <div>
                <h4 class="text-white font-black">${doc.name}</h4>
                <p class="text-xs text-slate-500">${doc.project} • v.${doc.ver}</p>
            </div>

            <div class="flex gap-3">
                <button onclick="openEditor(${doc.id})" class="bg-slate-800 px-6 py-3 rounded-xl">
                    ${state.role==='contractor'?'Править':'Контроль'}
                </button>

                ${state.role==='contractor'
                    ? `<button onclick="deleteDoc(${doc.id})" class="bg-rose-900 px-4 rounded-xl">X</button>`
                    : ''
                }
            </div>
        </div>
    `).join('');

}

function setRole(r){
    state.role=r;
    render();
}

function setFolder(f){
    state.folder=f;
    document.getElementById('current-project-title').innerText =
        f==='all' ? 'Все документы' : f;
    render();
}

function openEditor(id){
    state.activeId=id;
    const doc=state.docs.find(d=>d.id===id);

    document.getElementById('modalFileName').value=doc.name;
    document.getElementById('fileContent').value=doc.content;
    document.getElementById('in-status').value=doc.status;

    document.getElementById('editorModal').style.display='flex';
}

function saveAllChanges(){

    const doc=state.docs.find(d=>d.id===state.activeId);

    doc.name=document.getElementById('modalFileName').value;
    doc.content=document.getElementById('fileContent').value;
    doc.status=document.getElementById('in-status').value;

    if(state.role==='contractor'){
        doc.project=document.getElementById('in-proj').value;
        doc.ver++;
    }

    closeModal();
    render();
}

function handleFileUpload(input){

    if(!input.files.length) return;

    const file=input.files[0];

    const reader=new FileReader();

    reader.onload=e=>{

        state.docs.unshift({
            id:Date.now(),
            name:file.name,
            project: state.folder==='all'
                ? state.folders[0]
                : state.folder,
            status:'новый',
            ver:1,
            content:e.target.result
        });

        render();
    };

    reader.readAsText(file);
}

function deleteDoc(id){
    if(confirm('Удалить?')){
        state.docs=state.docs.filter(d=>d.id!==id);
        render();
    }
}

function closeModal(){
    document.getElementById('editorModal').style.display='none';
}

render();
</script>
