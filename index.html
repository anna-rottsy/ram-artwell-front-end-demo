<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Artwell Verify</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#020617; color:#cbd5e1; font-family:system-ui }
.editor { min-height:300px }
.dropzone { border:2px dashed #334155 }
</style>

</head>
<body class="h-screen overflow-hidden">

<div class="flex h-full">

<!-- SIDEBAR -->
<div class="w-72 bg-slate-900 p-6 flex flex-col gap-6">

<h1 class="text-white text-xl font-black">ARTWELL</h1>

<button onclick="createFolder()" class="bg-blue-600 p-3 rounded-xl">
+ папка
</button>

<div id="folders" class="space-y-2 overflow-auto"></div>

<div class="mt-auto">
<button onclick="setRole('contractor')" class="bg-blue-600 p-2 rounded">Подрядчик</button>
<button onclick="setRole('client')" class="bg-slate-700 p-2 rounded">Заказчик</button>
</div>

</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

<div class="p-6 border-b border-slate-800 flex gap-4 items-center">

<input type="file" id="fileInput" multiple class="hidden" onchange="uploadFiles(this.files)">

<button onclick="fileInput.click()" class="bg-white text-black px-6 py-3 rounded-xl font-bold">
UPLOAD
</button>

<div id="drop" class="dropzone flex-1 p-4 rounded-xl text-center">
DRAG FILES HERE
</div>

</div>

<div id="list" class="p-6 overflow-auto space-y-4"></div>

</div>

</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">

<div class="bg-slate-900 w-[900px] h-[80vh] rounded-3xl flex flex-col">

<div class="p-6 border-b border-slate-800 flex justify-between">
<input id="docName" class="bg-transparent text-white text-2xl font-bold outline-none">
<button onclick="closeModal()">X</button>
</div>

<div id="preview" class="flex-1 overflow-auto p-6"></div>

<div id="editorToolbar" class="p-4 border-t border-slate-800 flex gap-2">
<button onclick="cmd('bold')" class="bg-slate-700 px-3">B</button>
<button onclick="cmd('italic')" class="bg-slate-700 px-3">I</button>
<button onclick="cmd('insertUnorderedList')" class="bg-slate-700 px-3">LIST</button>
<button onclick="saveDoc()" class="bg-emerald-600 px-6 ml-auto">SAVE</button>
</div>

</div>

</div>

<script>

let state = {
role:"contractor",
folder:"all",
folders:["General"],
docs:[],
active:null
}

function renderFolders(){
folders.innerHTML =
`<div onclick="setFolder('all')" class="p-2 bg-slate-800 rounded cursor-pointer">All</div>`+
state.folders.map(f=>
`<div onclick="setFolder('${f}')" class="p-2 bg-slate-800 rounded cursor-pointer">${f}</div>`
).join("")
}

function renderDocs(){

let docs = state.folder==="all"
? state.docs
: state.docs.filter(d=>d.folder===state.folder)

list.innerHTML = docs.map(d=>`

<div class="bg-slate-900 p-6 rounded-2xl flex justify-between items-center">

<div>
<div class="text-white font-bold">${d.name}</div>
<div class="text-xs text-slate-500">v.${d.ver}</div>
</div>

<button onclick="openDoc(${d.id})" class="bg-blue-600 px-6 py-2 rounded">
OPEN
</button>

</div>

`).join("")

}

function setFolder(f){
state.folder=f
renderDocs()
}

function createFolder(){
let name = prompt("folder")
if(!name) return
state.folders.push(name)
renderFolders()
}

function uploadFiles(files){

[...files].forEach(file=>{

let reader = new FileReader()

reader.onload = e=>{

state.docs.unshift({
id:Date.now()+Math.random(),
name:file.name,
type:file.type,
folder:state.folder==="all"?state.folders[0]:state.folder,
content:e.target.result,
ver:1
})

renderDocs()

}

if(file.type.startsWith("text"))
reader.readAsText(file)
else
reader.readAsDataURL(file)

})

}

function openDoc(id){

let d = state.docs.find(x=>x.id===id)
state.active=d

docName.value=d.name

editorToolbar.style.display="flex"

if(d.type.startsWith("image")){
preview.innerHTML=`<img src="${d.content}" class="max-h-full">`
editorToolbar.style.display="none"
}

else if(d.type==="application/pdf"){
preview.innerHTML=`<iframe src="${d.content}" class="w-full h-full"></iframe>`
editorToolbar.style.display="none"
}

else if(d.type.startsWith("text") || d.content.startsWith("<")){
preview.innerHTML=`<div id="editor" contenteditable class="editor outline-none">${d.content}</div>`
}

else{
preview.innerHTML=`<a download="${d.name}" href="${d.content}" class="bg-blue-600 p-4 rounded">DOWNLOAD</a>`
editorToolbar.style.display="none"
}

modal.classList.remove("hidden")

}

function saveDoc(){

let editor = document.getElementById("editor")
if(!editor) return

state.active.content = editor.innerHTML
state.active.name = docName.value
state.active.ver++

closeModal()
renderDocs()

}

function closeModal(){
modal.classList.add("hidden")
}

function cmd(c){
document.execCommand(c,false,null)
}

drop.ondragover=e=>{
e.preventDefault()
drop.classList.add("bg-slate-800")
}

drop.ondragleave=e=>{
drop.classList.remove("bg-slate-800")
}

drop.ondrop=e=>{
e.preventDefault()
drop.classList.remove("bg-slate-800")
uploadFiles(e.dataTransfer.files)
}

renderFolders()
renderDocs()

</script>

</body>
</html>
