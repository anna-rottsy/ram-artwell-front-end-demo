<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Artwell Enterprise | Final MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .xml-editor { font-family: 'Courier New', monospace; background: #0f172a; color: #94a3b8; }
        .card-hover:hover { transform: translateY(-2px); border-color: #3b82f6; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 font-sans overflow-hidden">

    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-80 bg-[#0f172a] border-r border-slate-800 p-8 flex flex-col shadow-2xl z-20">
            <div class="flex items-center gap-4 mb-10">
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fas fa-project-diagram text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-white font-black text-xl leading-none uppercase tracking-tighter">Artwell</h1>
                    <p class="text-[9px] font-bold text-blue-500 uppercase tracking-[0.3em] mt-1">Verify System</p>
                </div>
            </div>
            
            <div class="space-y-6 flex-1">
                <div>
                    <p class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest">Проекты</p>
                    <nav class="space-y-1">
                        <button onclick="setProject('all')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 transition text-sm font-bold flex items-center justify-between">
                            <span>Все объекты</span>
                            <span id="badge-all" class="bg-slate-800 px-2 py-0.5 rounded text-[10px] font-mono">0</span>
                        </button>
                        <button onclick="setProject('ЖК Артвелл')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 transition text-sm font-bold flex items-center justify-between">
                            <span>🏢 ЖК Артвелл</span>
                            <span id="badge-jk" class="bg-slate-800 px-2 py-0.5 rounded text-[10px] font-mono">0</span>
                        </button>
                        <button onclick="setProject('Изыскания')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 transition text-sm font-bold flex items-center justify-between text-blue-400">
                            <span>🔬 Изыскания</span>
                            <span id="badge-iz" class="bg-slate-800 px-2 py-0.5 rounded text-[10px] font-mono">0</span>
                        </button>
                    </nav>
                </div>
            </div>

            <div class="mt-auto p-4 bg-slate-900/50 rounded-2xl border border-slate-800">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold text-white text-xs">АР</div>
                    <div><p class="text-xs font-bold text-white leading-none">Анна Verify</p></div>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col">
            <header class="h-24 px-10 flex items-center justify-between border-b border-slate-800 bg-[#020617]/80 backdrop-blur-xl z-10">
                <div class="flex items-center gap-8">
                    <div>
                        <p class="text-[9px] font-black text-slate-500 uppercase mb-1 italic">Текущий вид</p>
                        <h2 id="current-project-title" class="text-xl font-black text-white uppercase tracking-tight">Все объекты</h2>
                    </div>
                    <div class="flex gap-6">
                        <div class="text-center"><p id="stat-ok" class="text-emerald-400 font-black text-lg">0</p><p class="text-[8px] text-slate-500 uppercase">ОК</p></div>
                        <div class="text-center"><p id="stat-err" class="text-rose-500 font-black text-lg">0</p><p class="text-[8px] text-slate-500 uppercase">ERR</p></div>
                    </div>
                </div>
                <button onclick="document.getElementById('fileInput').click()" class="bg-white hover:bg-blue-50 text-slate-950 px-8 py-3.5 rounded-2xl font-black transition-all shadow-xl flex items-center gap-3">
                    <i class="fas fa-plus"></i> ПРИКРЕПИТЬ ФАЙЛ
                </button>
            </header>

            <div id="registry" class="flex-1 p-10 overflow-y-auto custom-scrollbar space-y-4">
                <!-- Каточки -->
            </div>
        </main>
    </div>

    <!-- МОДАЛКА РЕДАКТОРА -->
    <div id="editorModal" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/95 backdrop-blur-lg">
        <div class="bg-[#0f172a] w-full max-w-5xl h-[85vh] rounded-[2.5rem] border border-slate-700 shadow-2xl flex flex-col overflow-hidden">
            <div class="p-8 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                <div class="flex items-center gap-4">
                    <div class="bg-blue-600/20 p-3 rounded-xl"><i class="fas fa-edit text-blue-500"></i></div>
                    <h3 id="modalFileName" class="text-xl font-black text-white">filename.xsd</h3>
                </div>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white transition text-2xl">&times;</button>
            </div>
            <div class="flex-1 flex overflow-hidden">
                <textarea id="xmlContent" class="flex-1 xml-editor p-8 outline-none resize-none custom-scrollbar text-sm leading-relaxed" spellcheck="false"></textarea>
                <div class="w-80 p-8 space-y-6 bg-slate-900/30">
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase block mb-2 tracking-widest">Проект</label>
                        <select id="in-proj" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold outline-none">
                            <option value="ЖК Артвелл">ЖК Артвелл</option>
                            <option value="Изыскания">Изыскания</option>
                        </select>
                    </div>
                    <div class="pt-10 space-y-3">
                        <button onclick="saveDocument()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white p-4 rounded-2xl font-black text-xs uppercase transition shadow-lg">Сохранить v.<span id="next-v"></span></button>
                        <button onclick="closeModal()" class="w-full bg-slate-800 hover:bg-slate-700 text-white p-4 rounded-2xl font-black text-xs uppercase transition">Отмена</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" class="hidden" onchange="processFile(this)">

    <script>
        let db = [
            { id: 1, name: 'MainSchema-01.xsd', project: 'ЖК Артвелл', status: 'valid', ver: 1, content: '<?xml version="1.0" encoding="UTF-8"?>\n<xs:schema xmlns:xs="http://www.w3.org">\n  <xs:element name="note" type="xs:string""")/>>\n</xs:schema>' },
            { id: 2, name: 'GeologicalReport-01-00.xsd', project: 'Изыскания', status: 'error', ver: 1, content: '<xs:schema>\n  <!-- Error in tag -->\n  <xs:invalid_tag />\n</xs:schema>' }
        ];

        let currentFilter = 'all';
        let activeId = null;

        function render() {
            const container = document.getElementById('registry');
            const filtered = currentFilter === 'all' ? db : db.filter(d => d.project === currentFilter);
            
            container.innerHTML = filtered.map(doc => `
                <div class="bg-[#0f172a] p-6 rounded-[2rem] border border-slate-800/50 flex items-center justify-between transition-all card-hover group">
                    <div class="flex items-center gap-6">
                        <div class="w-14 h-14 bg-slate-900 rounded-2xl flex items-center justify-center border border-slate-700"><i class="fas fa-file-code text-slate-600"></i></div>
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <h4 class="text-xl font-black text-white">${doc.name}</h4>
                                <span class="text-[9px] bg-blue-600/10 text-blue-500 px-2 rounded-full font-black italic uppercase">v.${doc.ver}</span>
                            </div>
                            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">${doc.project} • <span class="${doc.status === 'valid' ? 'text-emerald-500' : 'text-rose-500'} font-black">${doc.status.toUpperCase()}</span></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="openEditor(${doc.id})" class="bg-slate-900 hover:bg-blue-600 text-slate-400 hover:text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase transition border border-slate-800">ПРАВИТЬ</button>
                        <button onclick="deleteDoc(${doc.id})" class="w-11 h-11 bg-slate-900 hover:bg-rose-600/20 text-slate-600 hover:text-rose-500 rounded-xl transition border border-slate-800 flex items-center justify-center">
                            <i class="far fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            updateStats();
        }

        function deleteDoc(id) {
            if (confirm('Вы уверены, что хотите удалить этот документ? Отменить действие будет невозможно.')) {
                db = db.filter(d => d.id !== id);
                render();
            }
        }

        function updateStats() {
            document.getElementById('badge-all').innerText = db.length;
            document.getElementById('badge-jk').innerText = db.filter(d => d.project === 'ЖК Артвелл').length;
            document.getElementById('badge-iz').innerText = db.filter(d => d.project === 'Изыскания').length;
            document.getElementById('stat-ok').innerText = db.filter(d => d.status === 'valid').length;
            document.getElementById('stat-err').innerText = db.filter(d => d.status === 'error').length;
        }

        function setProject(p) {
            currentFilter = p;
            document.getElementById('current-project-title').innerText = p === 'all' ? 'Все объекты' : p;
            render();
        }

        function processFile(input) {
            if (!input.files.length) return;
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                db.unshift({
                    id: Date.now(),
                    name: file.name,
                    project: file.name.toLowerCase().includes('report') ? 'Изыскания' : 'ЖК Артвелл',
                    status: 'valid',
                    ver: 1,
                    content: e.target.result
                });
                render();
            };
            reader.readAsText(file);
        }

        function openEditor(id) {
            activeId = id;
            const doc = db.find(d => d.id === id);
            document.getElementById('modalFileName').innerText = doc.name;
            document.getElementById('xmlContent').value = doc.content;
            document.getElementById('in-proj').value = doc.project;
            document.getElementById('next-v').innerText = doc.ver + 1;
            document.getElementById('editorModal').style.display = 'flex';
        }

        function saveDocument() {
            const doc = db.find(d => d.id === activeId);
            doc.project = document.getElementById('in-proj').value;
            doc.content = document.getElementById('xmlContent').value;
            doc.ver += 1;
            closeModal();
            render();
        }

        function closeModal() { document.getElementById('editorModal').style.display = 'none'; }
        
        render();
    </script>
</body>
</html>
