<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Artwell Enterprise | PLM System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .xml-editor { font-family: 'Courier New', monospace; background: #020617; color: #94a3b8; }
        .animate-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .role-badge { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 font-sans overflow-hidden">

    <div id="app" class="flex h-screen">
        <!-- SIDEBAR -->
        <aside class="w-80 bg-[#0f172a] border-r border-slate-800 p-8 flex flex-col shadow-2xl z-20 transition-all">
            <div class="flex items-center gap-4 mb-10">
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fas fa-microchip text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-white font-black text-xl leading-none uppercase tracking-tighter">Artwell</h1>
                    <p id="role-display" class="text-[9px] font-black text-blue-500 uppercase tracking-[0.3em] mt-1">Подрядчик</p>
                </div>
            </div>
            
            <div class="space-y-8 flex-1 overflow-y-auto custom-scrollbar pr-2">
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Проекты (Папки)</p>
                        <button onclick="addNewProject()" class="text-blue-500 hover:text-blue-400 text-xs font-bold transition">
                            <i class="fas fa-folder-plus"></i>
                        </button>
                    </div>
                    <nav id="project-nav" class="space-y-1">
                        <!-- Проекты рендерятся тут -->
                    </nav>
                </div>
            </div>

            <!-- ПЕРЕКЛЮЧАТЕЛЬ ЛК -->
            <div class="mt-auto p-5 bg-slate-900/50 rounded-[2rem] border border-slate-800 shadow-inner">
                <p class="text-[9px] font-black text-slate-500 uppercase mb-3 text-center tracking-widest">Переключить кабинет</p>
                <div class="flex gap-2 p-1 bg-slate-950 rounded-xl border border-slate-800">
                    <button onclick="switchRole('contractor')" id="role-cont" class="flex-1 py-2 text-[10px] font-black rounded-lg transition role-badge bg-blue-600 text-white uppercase">Подрядчик</button>
                    <button onclick="switchRole('client')" id="role-clie" class="flex-1 py-2 text-[10px] font-black rounded-lg transition role-badge text-slate-500 uppercase">Заказчик</button>
                </div>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col bg-gradient-to-br from-[#020617] to-[#0f172a]">
            <!-- Header -->
            <header class="h-24 px-10 flex items-center justify-between border-b border-slate-800 bg-[#020617]/50 backdrop-blur-xl z-10 shadow-lg shadow-black/10">
                <div>
                    <p class="text-[9px] font-black text-slate-500 uppercase mb-1 tracking-[0.2em] italic">Реестр документации</p>
                    <h2 id="current-project-title" class="text-2xl font-black text-white uppercase tracking-tight italic">Все объекты</h2>
                </div>
                
                <div class="flex items-center gap-6">
                    <div id="contractor-actions" class="flex items-center gap-4">
                        <button onclick="document.getElementById('fileInput').click()" class="bg-white hover:bg-blue-50 text-slate-950 px-8 py-3.5 rounded-2xl font-black transition-all shadow-xl shadow-white/5 flex items-center gap-3 active:scale-95">
                            <i class="fas fa-file-upload"></i> ПРИКРЕПИТЬ XML
                        </button>
                    </div>
                </div>
            </header>

            <!-- Registry Content -->
            <div id="registry" class="flex-1 p-10 overflow-y-auto custom-scrollbar space-y-4">
                <!-- Карточки документов -->
            </div>
        </main>
    </div>

    <!-- МОДАЛКА (РЕДАКТОР / ПРОСМОТР) -->
    <div id="editorModal" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/95 backdrop-blur-xl">
        <div class="bg-[#0f172a] w-full max-w-5xl h-[85vh] rounded-[3rem] border border-slate-700 shadow-2xl flex flex-col overflow-hidden animate-up">
            <div class="p-8 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                <div class="flex items-center gap-4">
                    <div class="bg-blue-600/20 p-4 rounded-2xl border border-blue-500/20"><i class="fas fa-scroll text-blue-500 text-xl"></i></div>
                    <div>
                        <h3 id="modalFileName" class="text-2xl font-black text-white italic tracking-tight uppercase">filename.xsd</h3>
                        <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mt-1 italic">Параметры и исходный код документа</p>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-12 h-12 rounded-full bg-slate-800 text-slate-400 hover:text-white transition flex items-center justify-center text-2xl font-light">&times;</button>
            </div>
            
            <div class="flex-1 flex overflow-hidden">
                <textarea id="xmlContent" class="flex-1 xml-editor p-10 outline-none resize-none custom-scrollbar text-sm leading-relaxed" spellcheck="false"></textarea>
                
                <div class="w-96 p-10 space-y-8 bg-slate-900/30 border-l border-slate-800">
                    <div id="status-edit-area">
                        <label class="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-widest">Статус ЖЦ (Для заказчика)</label>
                        <select id="in-status" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 text-sm text-white font-bold outline-none focus:border-blue-500 transition-all shadow-inner">
                            <option value="новый">⚪ Новый</option>
                            <option value="в разработке">🟡 В разработке</option>
                            <option value="готов">🟢 Готов</option>
                        </select>
                    </div>

                    <div class="pt-20 space-y-4">
                        <button id="save-btn" onclick="saveDocument()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white p-5 rounded-2xl font-black text-xs uppercase tracking-widest transition shadow-xl shadow-emerald-600/20">Сохранить изменения</button>
                        <button onclick="closeModal()" class="w-full bg-slate-800 hover:bg-slate-700 text-white p-5 rounded-2xl font-black text-xs uppercase transition tracking-widest italic">Закрыть</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" class="hidden" onchange="processFile(this)">

    <script>
        // ИМИТАЦИЯ БД
        let db = [
            { id: 1, name: 'MainSchema-2026.xsd', project: 'ЖК Артвелл', status: 'готов', ver: 1, content: '<?xml version="1.0" encoding="UTF-8"?>\n<xs:schema xmlns:xs="http://www.w3.org">...</xs:schema>' },
            { id: 2, name: 'GeologicalReport.xsd', project: 'Изыскания', status: 'в разработке', ver: 2, content: '<xs:schema>\n  <!-- Schema Section -->\n</xs:schema>' }
        ];

        let projects = ['ЖК Артвелл', 'Изыскания'];
        let currentFilter = 'all';
        let currentRole = 'contractor'; // contractor | client
        let activeId = null;

        function render() {
            // 1. Рендер навигации проектов
            const nav = document.getElementById('project-nav');
            nav.innerHTML = `
                <button onclick="setProject('all')" class="w-full text-left p-3.5 rounded-2xl hover:bg-slate-800 transition text-sm font-bold flex items-center justify-between ${currentFilter === 'all' ? 'bg-blue-600/10 text-blue-400' : ''}">
                    <span>📦 Все документы</span>
                </button>
            ` + projects.map(p => `
                <button onclick="setProject('${p}')" class="w-full text-left p-3.5 rounded-2xl hover:bg-slate-800 transition text-sm font-bold flex items-center justify-between ${currentFilter === p ? 'bg-blue-600/10 text-blue-400' : 'text-slate-400'}">
                    <span>📂 ${p}</span>
                    <span class="text-[9px] opacity-40 italic">${db.filter(d => d.project === p).length}</span>
                </button>
            `).join('');

            // 2. Рендер реестра
            const container = document.getElementById('registry');
            const filtered = currentFilter === 'all' ? db : db.filter(d => d.project === currentFilter);
            
            container.innerHTML = filtered.map(doc => `
                <div class="bg-[#0f172a] p-7 rounded-[3rem] border border-slate-800/50 flex items-center justify-between transition-all hover:border-blue-500/30 group animate-up shadow-lg">
                    <div class="flex items-center gap-7">
                        <div class="w-16 h-16 bg-slate-900 rounded-3xl flex items-center justify-center border border-slate-700 shadow-inner"><i class="fas fa-file-code ${doc.status === 'готов' ? 'text-emerald-500' : 'text-slate-600'} text-xl"></i></div>
                        <div>
                            <div class="flex items-center gap-4 mb-1.5">
                                <h4 class="text-xl font-black text-white italic tracking-tighter uppercase">${doc.name}</h4>
                                <span class="bg-blue-600/10 text-blue-500 text-[9px] px-2.5 py-0.5 rounded-full font-black uppercase italic border border-blue-500/10">v.${doc.ver}</span>
                            </div>
                            <div class="flex gap-4 items-center">
                                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">${doc.project}</p>
                                <span class="text-[10px] font-black uppercase tracking-widest px-3 py-0.5 rounded-full ${getStatusStyle(doc.status)}">${doc.status}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="openEditor(${doc.id})" class="bg-slate-900 hover:bg-blue-600 text-slate-400 hover:text-white px-9 py-4 rounded-2xl text-[10px] font-black uppercase transition-all border border-slate-800 shadow-lg tracking-widest italic">
                            ${currentRole === 'contractor' ? 'Править' : 'Просмотр'}
                        </button>
                        ${currentRole === 'contractor' ? `
                            <button onclick="deleteDoc(${doc.id})" class="w-14 h-14 bg-slate-900 hover:bg-rose-600/20 text-slate-600 hover:text-rose-500 rounded-2xl transition border border-slate-800 flex items-center justify-center text-lg active:scale-90">
                                <i class="fas fa-times"></i>
                            </button>
                        ` : ''}
                    </div>
                </div>
            `).join('');

            // Управление элементами интерфейса по роли
            document.getElementById('contractor-actions').style.display = currentRole === 'contractor' ? 'flex' : 'none';
        }

        function getStatusStyle(status) {
            const styles = {
                'новый': 'bg-slate-800 text-slate-400',
                'в разработке': 'bg-amber-500/10 text-amber-500',
                'готов': 'bg-emerald-500/10 text-emerald-500'
            };
            return styles[status] || styles['новый'];
        }

        function addNewProject() {
            const name = prompt('Введите название папки проекта:');
            if (name && !projects.includes(name)) {
                projects.push(name);
                render();
            }
        }

        function switchRole(role) {
            currentRole = role;
            document.getElementById('role-display').innerText = role === 'contractor' ? 'Подрядчик' : 'Заказчик';
            
            // Стили кнопок
            document.getElementById('role-cont').className = `flex-1 py-2 text-[10px] font-black rounded-lg transition uppercase ${role === 'contractor' ? 'bg-blue-600 text-white' : 'text-slate-500'}`;
            document.getElementById('role-clie').className = `flex-1 py-2 text-[10px] font-black rounded-lg transition uppercase ${role === 'client' ? 'bg-blue-600 text-white' : 'text-slate-500'}`;
            
            render();
        }

        function openEditor(id) {
            activeId = id;
            const doc = db.find(d => d.id === id);
            
            document.getElementById('modalFileName').innerText = doc.name;
            document.getElementById('xmlContent').value = doc.content;
            document.getElementById('in-status').value = doc.status;
            
            // Если заказчик - отключаем редактирование кода
            document.getElementById('xmlContent').readOnly = (currentRole === 'client');
            document.getElementById('save-btn').style.display = (currentRole === 'contractor' ? 'block' : 'none');
            
            document.getElementById('editorModal').style.display = 'flex';
        }

        function saveDocument() {
            const doc = db.find(d => d.id === activeId);
            doc.content = document.getElementById('xmlContent').value;
            doc.status = document.getElementById('in-status').value;
            doc.ver += 1;
            closeModal();
            render();
        }

        function processFile(input) {
            if (!input.files.length) return;
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                db.unshift({
                    id: Date.now(),
                    name: file.name,
                    project: currentFilter === 'all' ? projects[0] : currentFilter,
                    status: 'новый',
                    ver: 1,
                    content: e.target.result
                });
                render();
            };
            reader.readAsText(file);
        }

        function deleteDoc(id) {
            if (confirm('Удалить документ безвозвратно?')) {
                db = db.filter(d => d.id !== id);
                render();
            }
        }

        function setProject(p) { currentFilter = p; document.getElementById('current-project-title').innerText = p === 'all' ? 'Все документы' : p; render(); }
        function closeModal() { document.getElementById('editorModal').style.display = 'none'; }

        // ЗАПУСК
        switchRole('contractor');
    </script>
</body>
</html>
