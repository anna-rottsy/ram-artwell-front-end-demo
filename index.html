<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Platform Demo</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e9e9e9;
}

.header{
background:#dcdcdc;
padding:12px 20px;
display:flex;
justify-content:space-between;
font-weight:600;
}

.toolbar{
background:#8e8e8e;
padding:10px;
display:flex;
justify-content:flex-end;
gap:10px;
}

.search{
padding:6px;
width:160px;
}

.btn{
background:#4aa3ff;
border:none;
padding:6px 12px;
color:white;
cursor:pointer;
border-radius:4px;
}

.container{
padding:12px;
}

.project{
background:#cfcfcf;
padding:10px;
border-radius:6px;
margin-bottom:10px;
}

.projectHeader{
display:flex;
justify-content:space-between;
align-items:center;
}

.tag{
background:#efefef;
padding:4px 8px;
border-radius:4px;
margin-left:6px;
}

.statusProject{
background:#4caf50;
color:white;
padding:6px 12px;
border-radius:4px;
}

.docs{
background:#1f1f1f;
padding:10px;
border-radius:6px;
margin-top:10px;
}

.doc{
background:#3a3a3a;
padding:8px;
border-radius:6px;
margin-bottom:6px;
display:flex;
align-items:center;
justify-content:space-between;
color:white;
}

.docLeft{
display:flex;
align-items:center;
gap:8px;
}

.docRight{
display:flex;
align-items:center;
gap:8px;
}

.btnSmall{
background:#4aa3ff;
border:none;
padding:4px 8px;
border-radius:4px;
cursor:pointer;
}

.statusDoc{
background:#4caf50;
padding:4px 10px;
border-radius:4px;
}

.footer{
background:#1f1f1f;
color:white;
text-align:center;
padding:10px;
margin-top:20px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:flex;
justify-content:center;
align-items:center;
}

.modalContent{
background:white;
padding:20px;
width:600px;
}

textarea{
width:100%;
height:260px;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="header">
<div>Название платформы</div>
<div>Иванов И.И | ID 123</div>
</div>

<div class="toolbar">
<input class="search" placeholder="Найти">
<button class="btn" onclick="createProject()">+ Создать проект</button>
</div>

<div class="container" id="projects"></div>

<div class="footer">
Название проекта <br>
Хакатон 2026 | Команда: Верифай
</div>

<div id="modal" class="modal hidden">
<div class="modalContent">
<h3>XML редактор</h3>
<textarea id="xmlArea"></textarea>
<br><br>
<button class="btn" onclick="saveXML()">Сохранить</button>
<button class="btn" onclick="closeModal()">Закрыть</button>
</div>
</div>

<script>

let projects=[
{
id:1,
name:"ЖК Северный",
customer:"Петров",
responsible:"Иванов",
status:"Активный",
open:true
},
{
id:2,
name:"ТЦ Мега",
customer:"Сидоров",
responsible:"Кузнецов",
status:"Активный",
open:false
}
]

let docs=[
{
id:1,
projectId:1,
name:"Акт скрытых работ",
version:1,
creator:"Иванов",
status:"Готов",
xml:`<doc>
<name>Акт</name>
<version>1</version>
</doc>`
}
]

let currentDoc=null

function render(){

let html=""

projects.forEach(p=>{

html+=`
<div class="project">

<div class="projectHeader" onclick="toggle(${p.id})">

<div><b>${p.name}</b></div>

<div>
<span class="tag">${p.customer} | ID</span>
<span class="tag">${p.responsible}</span>
<span class="statusProject">${p.status}</span>
</div>

</div>

${p.open?renderDocs(p.id):""}

</div>
`

})

document.getElementById("projects").innerHTML=html

}

function renderDocs(pid){

let html=`<div class="docs">`

docs.filter(d=>d.projectId===pid)
.forEach(d=>{

html+=`
<div class="doc">

<div class="docLeft">
${d.name}
<span class="tag">Версия ${d.version}</span>

<button class="btnSmall" onclick="openXML(${d.id})">Просмотр</button>
<button class="btnSmall" onclick="openXML(${d.id})">Редактор</button>
<button class="btnSmall" onclick="newVersion(${d.id})">+ Версия</button>
</div>

<div class="docRight">
<span class="tag">${d.creator}</span>
<span class="statusDoc">${d.status}</span>
</div>

</div>
`

})

html+=`</div>`

return html

}

function toggle(id){
projects=projects.map(p=>{
if(p.id===id) p.open=!p.open
return p
})
render()
}

function newVersion(id){
docs=docs.map(d=>{
if(d.id===id) d.version++
return d
})
render()
}

function openXML(id){
currentDoc=id
let d=docs.find(x=>x.id===id)
xmlArea.value=d.xml
modal.classList.remove("hidden")
}

function saveXML(){
docs=docs.map(d=>{
if(d.id===currentDoc) d.xml=xmlArea.value
return d
})
closeModal()
}

function closeModal(){
modal.classList.add("hidden")
}

function createProject(){
let name=prompt("Название проекта")
projects.push({
id:Date.now(),
name,
customer:"—",
responsible:"—",
status:"Новый",
open:false
})
render()
}

render()

</script>
</body>
</html>
