<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ARTWELL P-XML</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f8fc;
display:flex;
flex-direction:column;
min-height:100vh;
}

.header{
background:white;
padding:14px 24px;
display:flex;
justify-content:space-between;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
font-weight:600;
}

.toolbar{
padding:14px 24px;
display:flex;
justify-content:flex-end;
gap:10px;
}

input{
padding:8px;
border-radius:6px;
border:1px solid #cfd8e3;
}

.btn{
background:#2f8cff;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.container{
flex:1;
padding:0 24px 24px 24px;
}

.project{
background:white;
border-radius:10px;
padding:14px;
margin-bottom:14px;
box-shadow:0 6px 14px rgba(0,0,0,0.08);
}

.projectHeader{
display:flex;
justify-content:space-between;
cursor:pointer;
}

.tags span{
background:#eef3f9;
padding:5px 10px;
border-radius:6px;
margin-left:6px;
font-size:13px;
}

.statusProject{
background:#39b36e;
color:white;
}

.docs{
margin-top:12px;
border-top:1px solid #e6edf5;
padding-top:10px;
}

.doc{
background:#f7fbff;
padding:10px;
border-radius:8px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.actions button{
margin-left:6px;
background:#d8e9ff;
border:none;
padding:5px 9px;
border-radius:6px;
cursor:pointer;
}

.footer{
background:white;
text-align:center;
padding:14px;
box-shadow:0 -2px 6px rgba(0,0,0,0.06);
}

.page{
display:none;
padding:30px;
}

.active{
display:block;
}

.uploadBox{
background:white;
padding:20px;
border-radius:10px;
width:420px;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

</style>
</head>

<body>

<div class="header">
<div><b>ARTWELL P-XML</b></div>
<div>Иванов И.И | ID 123</div>
</div>

<div id="mainPage" class="active">

<div class="toolbar">
<input placeholder="Найти проект">
<button class="btn" onclick="createProject()">+ Создать проект</button>
</div>

<div class="container" id="projects"></div>

</div>

<div id="uploadPage" class="page">
<button class="btn" onclick="back()">← Назад</button>

<h2 id="projectTitle"></h2>

<div class="uploadBox">

<h3>Добавить документ</h3>

<input id="docName" placeholder="Название"><br><br>
<input id="docCreator" placeholder="Сотрудник"><br><br>

<select id="docStatus">
<option>Новый</option>
<option>На проверке</option>
<option>На согласовании</option>
<option>Готов</option>
</select>

<br><br>

<input type="file"><br><br>

<button class="btn" onclick="saveDoc()">Загрузить</button>

</div>

</div>

<div class="footer">
ARTWELL P-XML | Hackathon 2026 | Команда Верифай
</div>

<script>

let currentProject=null

let projects=[
{
id:1,
name:"ЖК Северный",
open:true
}
]

let docs=[
{
projectId:1,
name:"Акт работ",
version:1,
creator:"Иванов",
status:"Готов"
}
]

function render(){

let html=""

projects.forEach(p=>{

html+=`
<div class="project">

<div class="projectHeader">

<div onclick="openUpload(${p.id})"><b>${p.name}</b></div>

<div class="tags">
<span>Заказчик</span>
<span>Ответственный</span>
<span class="statusProject">Активный</span>
</div>

</div>

${p.open?renderDocs(p.id):""}

</div>
`

})

projectsDiv.innerHTML=html

}

function renderDocs(pid){

let html=`<div class="docs">`

docs.filter(d=>d.projectId===pid)
.forEach(d=>{

html+=`
<div class="doc">

<div>
${d.name}
<span class="tags"><span>v${d.version}</span></span>
</div>

<div class="actions">
<button>Просмотр</button>
<button>Редактор</button>
<button onclick="newVersion('${d.name}')">+ Версия</button>
<span class="tags"><span>${d.creator}</span></span>
<span class="tags"><span>${d.status}</span></span>
</div>

</div>
`

})

html+=`</div>`

return html

}

function openUpload(id){

currentProject=id

let p=projects.find(x=>x.id===id)

projectTitle.innerText="Проект: "+p.name

mainPage.classList.remove("active")
uploadPage.classList.add("active")

}

function back(){
uploadPage.classList.remove("active")
mainPage.classList.add("active")
}

function saveDoc(){

docs.push({
projectId:currentProject,
name:docName.value,
version:1,
creator:docCreator.value,
status:docStatus.value
})

back()
render()

}

function newVersion(name){

docs=docs.map(d=>{
if(d.name===name) d.version++
return d
})

render()

}

function createProject(){

let name=prompt("Название проекта")

projects.push({
id:Date.now(),
name,
open:true
})

render()

}

render()

</script>

</body>
</html>
