<script>

let projects=[
{
id:1,
name:"ЖК Северный",
customer:"Петров",
responsible:"Иванов",
status:"Активный",
open:true
}
]

let docs=[
{
id:1,
projectId:1,
name:"Акт скрытых работ",
version:1,
creator:"Иванов",
status:"Новый",
xml:"<doc></doc>"
}
]

let currentProject=null
let editDoc=null

function render(){

let html=""

projects.forEach(p=>{

html+=`
<div class="project">

<div class="projectHeader" onclick="toggleProject(${p.id})">

<div><b>${p.name}</b></div>

<div class="tags">
<span>${p.customer} | ID</span>
<span>${p.responsible}</span>

<select onchange="setProjectStatus(${p.id},this.value)">
<option ${p.status=="Активный"?"selected":""}>Активный</option>
<option ${p.status=="На паузе"?"selected":""}>На паузе</option>
<option ${p.status=="Завершен"?"selected":""}>Завершен</option>
</select>

<button class="btn" onclick="openAddFile(${p.id});event.stopPropagation()">+ Файл</button>

</div>

</div>

${p.open?renderDocs(p.id):""}

</div>
`

})

projectsContainer.innerHTML=html

}

function renderDocs(pid){

let html=`<div class="docs">`

docs.filter(d=>d.projectId===pid)
.forEach(d=>{

html+=`
<div class="doc">

<div class="docLeft">

${d.name}

<span class="tag">v${d.version}</span>

<button onclick="viewDoc(${d.id})">Просмотр</button>
<button onclick="editDocXML(${d.id})">Редактор</button>
<button onclick="newVersion(${d.id})">+ Версия</button>

</div>

<div class="docRight">

<span>${d.creator}</span>

<select onchange="setDocStatus(${d.id},this.value)">
<option ${d.status=="Новый"?"selected":""}>Новый</option>
<option ${d.status=="На проверке"?"selected":""}>На проверке</option>
<option ${d.status=="На согласовании"?"selected":""}>На согласовании</option>
<option ${d.status=="Готов"?"selected":""}>Готов</option>
</select>

</div>

</div>
`

})

html+=`</div>`
return html

}

function toggleProject(id){
projects=projects.map(p=>{
if(p.id===id) p.open=!p.open
return p
})
render()
}

function openAddFile(pid){
currentProject=pid
fileModal.classList.remove("hidden")
}

function editDocXML(id){

let d=docs.find(x=>x.id===id)

editDoc=id
docName.value=d.name
docCreator.value=d.creator
docXML.value=d.xml

fileModal.classList.remove("hidden")

}

function viewDoc(id){

let d=docs.find(x=>x.id===id)

alert(d.xml)

}

function saveDoc(){

if(editDoc){

docs=docs.map(d=>{
if(d.id===editDoc){
d.name=docName.value
d.creator=docCreator.value
d.xml=docXML.value
}
return d
})

}else{

docs.push({
id:Date.now(),
projectId:currentProject,
name:docName.value,
version:1,
creator:docCreator.value,
status:"Новый",
xml:docXML.value
})

}

fileModal.classList.add("hidden")
render()

}

function newVersion(id){

docs=docs.map(d=>{
if(d.id===id) d.version++
return d
})

render()

}

function setDocStatus(id,status){

docs=docs.map(d=>{
if(d.id===id) d.status=status
return d
})

}

function setProjectStatus(id,status){

projects=projects.map(p=>{
if(p.id===id) p.status=status
return p
})

}

function createProject(){

projects.push({
id:Date.now(),
name:projectName.value,
customer:"—",
responsible:"—",
status:"Активный",
open:true
})

projectModal.classList.add("hidden")
render()

}

render()

</script>
